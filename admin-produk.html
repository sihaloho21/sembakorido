<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Produk – GoSembako Admin</title>
    <link rel="icon" href="assets/img/logo.webp" type="image/webp">
    <link rel="stylesheet" href="assets/css/tailwind.min.css">
    <style>
        :root {
            --brand: #128052;
            --brand-dark: #0b5f42;
            --brand-soft: #e7f8ef;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; }

        /* ── PIN SCREEN ── */
        #pin-screen {
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0b5f42 0%, #128052 50%, #1d4ed8 100%);
        }
        .pin-card {
            background: #fff; border-radius: 1.5rem;
            padding: 2.5rem 2rem; width: 100%; max-width: 360px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.18);
            text-align: center;
        }
        .pin-input {
            letter-spacing: 0.5em; font-size: 1.5rem; font-weight: 700;
            text-align: center; border: 2px solid #e5e7eb;
            border-radius: 0.75rem; padding: 0.75rem 1rem;
            width: 100%; outline: none; transition: border-color 0.2s;
        }
        .pin-input:focus { border-color: var(--brand); }
        .pin-btn {
            width: 100%; padding: 0.85rem;
            background: linear-gradient(135deg, var(--brand-dark), var(--brand));
            color: #fff; font-weight: 700; border-radius: 0.75rem;
            border: none; cursor: pointer; font-size: 1rem;
            transition: opacity 0.2s; margin-top: 1rem;
        }
        .pin-btn:hover { opacity: 0.88; }
        .pin-error { color: #dc2626; font-size: 0.82rem; margin-top: 0.5rem; min-height: 1.2em; }

        /* ── MAIN APP ── */
        #app { display: none; }
        .topbar {
            background: linear-gradient(135deg, var(--brand-dark), var(--brand));
            color: #fff; padding: 0 1.25rem; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 40;
            box-shadow: 0 4px 16px rgba(11,95,66,0.18);
        }
        .topbar-brand { display: flex; align-items: center; gap: 0.625rem; }
        .topbar-brand img { height: 36px; }
        .topbar-brand span { font-size: 1rem; font-weight: 800; }
        .topbar-actions { display: flex; align-items: center; gap: 0.5rem; }
        .btn-topbar {
            font-size: 0.75rem; font-weight: 700; padding: 0.4rem 0.875rem;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
            border-radius: 0.5rem; color: #fff; cursor: pointer; transition: background 0.2s;
            text-decoration: none; display: inline-flex; align-items: center; gap: 0.375rem;
        }
        .btn-topbar:hover { background: rgba(255,255,255,0.25); }

        /* ── LAYOUT ── */
        .main-wrap { max-width: 1200px; margin: 0 auto; padding: 1.25rem; }

        /* ── TOOLBAR ── */
        .toolbar {
            background: #fff; border-radius: 1rem; border: 1px solid #e2e8f0;
            padding: 1rem 1.25rem; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(15,23,42,0.05);
        }
        .search-box {
            flex: 1; min-width: 200px; position: relative;
        }
        .search-box input {
            width: 100%; padding: 0.55rem 0.875rem 0.55rem 2.25rem;
            border: 1.5px solid #e2e8f0; border-radius: 0.625rem;
            font-size: 0.85rem; outline: none; transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--brand); }
        .search-box svg { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: #94a3b8; }
        .filter-select {
            padding: 0.55rem 0.75rem; border: 1.5px solid #e2e8f0;
            border-radius: 0.625rem; font-size: 0.82rem; outline: none;
            background: #fff; cursor: pointer; transition: border-color 0.2s;
        }
        .filter-select:focus { border-color: var(--brand); }
        .btn-action {
            padding: 0.55rem 1rem; border-radius: 0.625rem;
            font-size: 0.82rem; font-weight: 700; cursor: pointer;
            border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.375rem;
        }
        .btn-on  { background: #dcfce7; color: #15803d; }
        .btn-on:hover  { background: #bbf7d0; }
        .btn-off { background: #fee2e2; color: #dc2626; }
        .btn-off:hover { background: #fecaca; }
        .btn-primary { background: var(--brand); color: #fff; }
        .btn-primary:hover { background: var(--brand-dark); }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1.5px solid #e2e8f0; }
        .btn-secondary:hover { background: #e2e8f0; }
        .selected-count {
            font-size: 0.78rem; font-weight: 700; color: var(--brand);
            background: var(--brand-soft); padding: 0.35rem 0.75rem;
            border-radius: 99px; white-space: nowrap;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 640px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } }
        .stat-card {
            background: #fff; border-radius: 0.875rem; padding: 1rem 1.25rem;
            border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(15,23,42,0.04);
        }
        .stat-label { font-size: 0.7rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-value { font-size: 1.75rem; font-weight: 900; color: #0f172a; line-height: 1.2; margin-top: 0.25rem; }
        .stat-value.green { color: #15803d; }
        .stat-value.red   { color: #dc2626; }
        .stat-value.amber { color: #d97706; }

        /* ── PRODUCT TABLE ── */
        .table-card {
            background: #fff; border-radius: 1rem; border: 1px solid #e2e8f0;
            box-shadow: 0 2px 12px rgba(15,23,42,0.05); overflow: hidden;
        }
        .table-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid #f1f5f9;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;
        }
        .table-title { font-size: 0.9rem; font-weight: 800; color: #0f172a; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead th {
            padding: 0.75rem 1rem; text-align: left;
            font-size: 0.7rem; font-weight: 800; color: #64748b;
            text-transform: uppercase; letter-spacing: 0.05em;
            background: #f8fafc; border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }
        thead th:first-child { border-radius: 0; }
        tbody tr { border-bottom: 1px solid #f1f5f9; transition: background 0.1s; }
        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: #f8fafc; }
        tbody tr.selected-row { background: #eff6ff; }
        td { padding: 0.75rem 1rem; font-size: 0.82rem; color: #374151; vertical-align: middle; }
        td.check-col { width: 40px; }

        /* ── CHECKBOX ── */
        .custom-checkbox {
            width: 18px; height: 18px; border-radius: 5px;
            border: 2px solid #d1d5db; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .custom-checkbox.checked { background: var(--brand); border-color: var(--brand); }
        .custom-checkbox.checked::after {
            content: ''; width: 5px; height: 9px;
            border: 2px solid #fff; border-top: none; border-left: none;
            transform: rotate(45deg) translate(-1px, -1px);
        }

        /* ── PRODUCT ROW ── */
        .prod-img {
            width: 48px; height: 48px; border-radius: 0.5rem;
            object-fit: cover; background: #f1f5f9; flex-shrink: 0;
        }
        .prod-name { font-weight: 700; color: #1e293b; }
        .prod-cat  { font-size: 0.7rem; color: #64748b; margin-top: 0.125rem; }

        /* ── STATUS TOGGLE ── */
        .toggle-wrap { display: flex; align-items: center; gap: 0.5rem; }
        .toggle-switch {
            position: relative; width: 44px; height: 24px;
            cursor: pointer; flex-shrink: 0;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; inset: 0;
            background: #e2e8f0; border-radius: 99px;
            transition: background 0.2s;
        }
        .toggle-slider::before {
            content: ''; position: absolute;
            width: 18px; height: 18px; border-radius: 50%;
            background: #fff; left: 3px; top: 3px;
            transition: transform 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.18);
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--brand); }
        .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }
        .toggle-switch.saving .toggle-slider { background: #fbbf24; }
        .status-label {
            font-size: 0.72rem; font-weight: 700; white-space: nowrap;
        }
        .status-label.on  { color: #15803d; }
        .status-label.off { color: #dc2626; }

        /* ── BADGE ── */
        .badge {
            display: inline-flex; align-items: center; gap: 0.25rem;
            font-size: 0.68rem; font-weight: 700; padding: 0.2rem 0.6rem;
            border-radius: 99px; white-space: nowrap;
        }
        .badge-on  { background: #dcfce7; color: #15803d; }
        .badge-off { background: #fee2e2; color: #dc2626; }

        /* ── LOADING / EMPTY ── */
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 0.5rem; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .empty-state { padding: 3rem 1rem; text-align: center; color: #94a3b8; }
        .empty-state svg { margin: 0 auto 1rem; opacity: 0.4; }

        /* ── TOAST ── */
        #toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
        .toast {
            padding: 0.75rem 1.25rem; border-radius: 0.75rem; font-size: 0.82rem; font-weight: 700;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); animation: slideIn 0.25s ease;
            display: flex; align-items: center; gap: 0.5rem; max-width: 320px;
        }
        .toast-success { background: #15803d; color: #fff; }
        .toast-error   { background: #dc2626; color: #fff; }
        .toast-info    { background: #1d4ed8; color: #fff; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* ── BULK ACTION BAR ── */
        #bulk-bar {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: #fff; border-radius: 1rem;
            padding: 0.875rem 1.5rem; display: none; align-items: center; gap: 1rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25); z-index: 100;
            animation: slideUp 0.25s ease;
        }
        #bulk-bar.show { display: flex; }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
        .bulk-info { font-size: 0.85rem; font-weight: 700; }
        .bulk-btn {
            padding: 0.5rem 1rem; border-radius: 0.625rem;
            font-size: 0.82rem; font-weight: 700; cursor: pointer; border: none;
            transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.375rem;
        }
        .bulk-btn-on  { background: #22c55e; color: #fff; }
        .bulk-btn-on:hover  { background: #16a34a; }
        .bulk-btn-off { background: #ef4444; color: #fff; }
        .bulk-btn-off:hover { background: #dc2626; }
        .bulk-btn-cancel { background: rgba(255,255,255,0.12); color: #fff; }
        .bulk-btn-cancel:hover { background: rgba(255,255,255,0.22); }

        /* ── PAGINATION ── */
        .pagination { display: flex; align-items: center; justify-content: center; gap: 0.375rem; padding: 1rem; }
        .page-btn {
            width: 34px; height: 34px; border-radius: 0.5rem;
            border: 1.5px solid #e2e8f0; background: #fff;
            font-size: 0.82rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; color: #374151;
        }
        .page-btn:hover { border-color: var(--brand); color: var(--brand); }
        .page-btn.active { background: var(--brand); border-color: var(--brand); color: #fff; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<!-- ── PIN SCREEN ── -->
<div id="pin-screen">
    <div class="pin-card">
        <img src="assets/img/logo.webp" alt="Logo" style="height:56px;margin:0 auto 1rem;" onerror="this.style.display='none'">
        <h2 style="font-size:1.25rem;font-weight:900;color:#0f172a;margin-bottom:0.25rem;">Kelola Produk</h2>
        <p style="font-size:0.82rem;color:#64748b;margin-bottom:1.5rem;">Masukkan PIN Admin untuk melanjutkan</p>
        <input type="password" id="pin-input" class="pin-input" placeholder="••••••" maxlength="10" autocomplete="off">
        <div class="pin-error" id="pin-error"></div>
        <button class="pin-btn" onclick="checkPin()">Masuk</button>
    </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
    <!-- Topbar -->
    <div class="topbar">
        <div class="topbar-brand">
            <img src="assets/img/logo.webp" alt="Logo" onerror="this.style.display='none'">
            <span>Kelola Produk</span>
        </div>
        <div class="topbar-actions">
            <a href="index.html" class="btn-topbar" target="_blank">
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                Homepage
            </a>
            <a href="admin-brosur.html" class="btn-topbar">
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Brosur
            </a>
            <button class="btn-topbar" onclick="logout()">Keluar</button>
        </div>
    </div>

    <div class="main-wrap">

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-label">Total Produk</div>
                <div class="stat-value" id="stat-total">–</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Ditampilkan</div>
                <div class="stat-value green" id="stat-on">–</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Disembunyikan</div>
                <div class="stat-value red" id="stat-off">–</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Stok Habis</div>
                <div class="stat-value amber" id="stat-empty">–</div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/></svg>
                <input type="text" id="search-input" placeholder="Cari nama produk..." oninput="applyFilter()">
            </div>
            <select class="filter-select" id="filter-status" onchange="applyFilter()">
                <option value="all">Semua Status</option>
                <option value="on">Ditampilkan</option>
                <option value="off">Disembunyikan</option>
            </select>
            <select class="filter-select" id="filter-category" onchange="applyFilter()">
                <option value="all">Semua Kategori</option>
            </select>
            <button class="btn-action btn-secondary" onclick="toggleSelectAll()">
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Pilih Semua
            </button>
            <button class="btn-action btn-secondary" onclick="loadProducts()">
                <svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Refresh
            </button>
            <span class="selected-count" id="selected-count" style="display:none;">0 dipilih</span>
        </div>

        <!-- Table -->
        <div class="table-card">
            <div class="table-header">
                <span class="table-title">Daftar Produk</span>
                <span id="product-count" style="font-size:0.78rem;color:#64748b;font-weight:600;"></span>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th class="check-col">
                                <div class="custom-checkbox" id="check-all" onclick="toggleSelectAll()"></div>
                            </th>
                            <th>Produk</th>
                            <th>Kategori</th>
                            <th>Harga</th>
                            <th>Stok</th>
                            <th>Tampil di Homepage</th>
                        </tr>
                    </thead>
                    <tbody id="product-tbody">
                        <tr><td colspan="6" class="empty-state">
                            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 10V7"/></svg>
                            <p>Memuat produk...</p>
                        </td></tr>
                    </tbody>
                </table>
            </div>
            <div id="pagination" class="pagination"></div>
        </div>
    </div>
</div>

<!-- Bulk Action Bar -->
<div id="bulk-bar">
    <span class="bulk-info" id="bulk-info">0 produk dipilih</span>
    <button class="bulk-btn bulk-btn-on" onclick="bulkSetStatus('tampil')">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        ON – Tampilkan
    </button>
    <button class="bulk-btn bulk-btn-off" onclick="bulkSetStatus('sembunyikan')">
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
        OFF – Sembunyikan
    </button>
    <button class="bulk-btn bulk-btn-cancel" onclick="clearSelection()">Batal</button>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/gas-actions.js"></script>
<script>
/* ═══════════════════════════════════════════════
   PIN AUTHENTICATION
═══════════════════════════════════════════════ */
const BROSUR_PIN_KEY     = 'gosembako_brosur_auth';
const BROSUR_PIN_CORRECT = '082625';

function checkPin() {
    const val = document.getElementById('pin-input').value.trim();
    const err = document.getElementById('pin-error');
    if (val === BROSUR_PIN_CORRECT) {
        sessionStorage.setItem(BROSUR_PIN_KEY, '1');
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadProducts();
    } else {
        err.textContent = 'PIN salah. Coba lagi.';
        document.getElementById('pin-input').value = '';
        document.getElementById('pin-input').focus();
    }
}
function logout() {
    sessionStorage.removeItem(BROSUR_PIN_KEY);
    location.reload();
}
document.getElementById('pin-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPin(); });
if (sessionStorage.getItem(BROSUR_PIN_KEY) === '1') {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
}

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let allProducts    = [];
let filteredProds  = [];
let selectedIds    = new Set();
let savingIds      = new Set();
let currentPage    = 1;
const PAGE_SIZE    = 20;

/* ═══════════════════════════════════════════════
   LOAD PRODUCTS
═══════════════════════════════════════════════ */
async function loadProducts() {
    renderSkeleton();
    try {
        const apiUrl = CONFIG.getMainApiUrl();
        const res = await fetch(`${apiUrl}?sheet=products`);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        allProducts = Array.isArray(data) ? data : (data.data || []);
        allProducts = allProducts.map(p => ({
            ...p,
            status: (p.status || 'tampil').toLowerCase().trim()
        }));
        populateCategoryFilter();
        updateStats();
        applyFilter();
        showToast('Produk berhasil dimuat', 'success');
    } catch (err) {
        console.error(err);
        document.getElementById('product-tbody').innerHTML = `
            <tr><td colspan="6" class="empty-state">
                <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
                <p style="font-weight:700;color:#dc2626;">Gagal memuat produk</p>
                <p style="font-size:0.75rem;margin-top:0.25rem;">${err.message}</p>
                <button onclick="loadProducts()" style="margin-top:0.75rem;padding:0.5rem 1.25rem;background:var(--brand);color:#fff;border:none;border-radius:0.5rem;font-weight:700;cursor:pointer;">Coba Lagi</button>
            </td></tr>`;
    }
}

/* ═══════════════════════════════════════════════
   FILTER & RENDER
═══════════════════════════════════════════════ */
function applyFilter() {
    const q    = (document.getElementById('search-input').value || '').toLowerCase().trim();
    const st   = document.getElementById('filter-status').value;
    const cat  = document.getElementById('filter-category').value;

    filteredProds = allProducts.filter(p => {
        const matchQ   = !q || (p.nama || '').toLowerCase().includes(q);
        const matchSt  = st === 'all' || (st === 'on' ? p.status !== 'sembunyikan' : p.status === 'sembunyikan');
        const matchCat = cat === 'all' || (p.kategori || '') === cat;
        return matchQ && matchSt && matchCat;
    });

    currentPage = 1;
    renderTable();
    renderPagination();
    document.getElementById('product-count').textContent =
        `${filteredProds.length} dari ${allProducts.length} produk`;
}

function renderTable() {
    const tbody = document.getElementById('product-tbody');
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filteredProds.slice(start, start + PAGE_SIZE);

    if (page.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">
            <svg width="48" height="48" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <p>Tidak ada produk yang cocok</p>
        </td></tr>`;
        return;
    }

    tbody.innerHTML = page.map(p => {
        const isOn     = p.status !== 'sembunyikan';
        const isSaving = savingIds.has(String(p.id));
        const isChecked = selectedIds.has(String(p.id));
        const imgSrc   = (p.gambar || '').split(',')[0].trim() || 'https://placehold.co/48x48?text=?';
        const stokNum  = parseInt(p.stok) || 0;
        const stokHtml = stokNum === 0
            ? `<span style="color:#dc2626;font-weight:700;">Habis</span>`
            : stokNum <= 5
            ? `<span style="color:#d97706;font-weight:700;">${stokNum}</span>`
            : `<span style="color:#15803d;font-weight:700;">${stokNum}</span>`;

        return `<tr class="${isChecked ? 'selected-row' : ''}" data-id="${p.id}">
            <td class="check-col">
                <div class="custom-checkbox ${isChecked ? 'checked' : ''}" onclick="toggleSelect('${p.id}')"></div>
            </td>
            <td>
                <div style="display:flex;align-items:center;gap:0.75rem;">
                    <img src="${imgSrc}" class="prod-img" alt="" loading="lazy" onerror="this.src='https://placehold.co/48x48?text=?'">
                    <div>
                        <div class="prod-name">${escHtml(p.nama || '–')}</div>
                        <div class="prod-cat">ID: ${p.id}</div>
                    </div>
                </div>
            </td>
            <td><span style="font-size:0.75rem;background:#f1f5f9;padding:0.2rem 0.6rem;border-radius:99px;font-weight:600;">${escHtml(p.kategori || '–')}</span></td>
            <td style="font-weight:700;color:#15803d;">Rp ${parseInt(p.harga || 0).toLocaleString('id-ID')}</td>
            <td>${stokHtml}</td>
            <td>
                <div class="toggle-wrap">
                    <label class="toggle-switch ${isSaving ? 'saving' : ''}" title="${isOn ? 'Klik untuk sembunyikan' : 'Klik untuk tampilkan'}">
                        <input type="checkbox" ${isOn ? 'checked' : ''} ${isSaving ? 'disabled' : ''}
                            onchange="toggleStatus('${p.id}', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="status-label ${isOn ? 'on' : 'off'}">
                        ${isSaving ? '⏳ Menyimpan...' : isOn ? '✓ Tampil' : '✕ Tersembunyi'}
                    </span>
                </div>
            </td>
        </tr>`;
    }).join('');
}

function renderSkeleton() {
    const rows = Array.from({length: 8}, () => `<tr>
        <td><div class="skeleton" style="width:18px;height:18px;border-radius:4px;"></div></td>
        <td><div style="display:flex;gap:0.75rem;align-items:center;">
            <div class="skeleton" style="width:48px;height:48px;border-radius:0.5rem;flex-shrink:0;"></div>
            <div><div class="skeleton" style="width:140px;height:14px;margin-bottom:6px;"></div>
            <div class="skeleton" style="width:80px;height:11px;"></div></div>
        </div></td>
        <td><div class="skeleton" style="width:80px;height:22px;border-radius:99px;"></div></td>
        <td><div class="skeleton" style="width:90px;height:14px;"></div></td>
        <td><div class="skeleton" style="width:40px;height:14px;"></div></td>
        <td><div class="skeleton" style="width:100px;height:24px;border-radius:99px;"></div></td>
    </tr>`).join('');
    document.getElementById('product-tbody').innerHTML = rows;
}

/* ═══════════════════════════════════════════════
   PAGINATION
═══════════════════════════════════════════════ */
function renderPagination() {
    const total = Math.ceil(filteredProds.length / PAGE_SIZE);
    const el    = document.getElementById('pagination');
    if (total <= 1) { el.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>‹</button>`;
    for (let i = 1; i <= total; i++) {
        if (i === 1 || i === total || Math.abs(i - currentPage) <= 1) {
            html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (Math.abs(i - currentPage) === 2) {
            html += `<span style="padding:0 0.25rem;color:#94a3b8;">…</span>`;
        }
    }
    html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage === total ? 'disabled' : ''}>›</button>`;
    el.innerHTML = html;
}
function goPage(p) {
    const total = Math.ceil(filteredProds.length / PAGE_SIZE);
    if (p < 1 || p > total) return;
    currentPage = p;
    renderTable();
    renderPagination();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═══════════════════════════════════════════════
   TOGGLE STATUS (SINGLE)
═══════════════════════════════════════════════ */
async function toggleStatus(id, isOn) {
    const newStatus = isOn ? 'tampil' : 'sembunyikan';
    savingIds.add(String(id));
    renderTable();

    try {
        await GASActions.update('products', String(id), { status: newStatus });
        // Update local state
        const prod = allProducts.find(p => String(p.id) === String(id));
        if (prod) prod.status = newStatus;
        updateStats();
        showToast(`Produk berhasil di-${isOn ? 'tampilkan' : 'sembunyikan'}`, 'success');
    } catch (err) {
        console.error(err);
        // Revert
        const prod = allProducts.find(p => String(p.id) === String(id));
        if (prod) prod.status = isOn ? 'sembunyikan' : 'tampil'; // revert
        showToast('Gagal menyimpan. Coba lagi.', 'error');
    } finally {
        savingIds.delete(String(id));
        renderTable();
    }
}

/* ═══════════════════════════════════════════════
   BULK SELECT & ACTION
═══════════════════════════════════════════════ */
function toggleSelect(id) {
    const sid = String(id);
    if (selectedIds.has(sid)) selectedIds.delete(sid);
    else selectedIds.add(sid);
    updateSelectionUI();
    renderTable();
}

function toggleSelectAll() {
    const pageIds = getCurrentPageIds();
    const allSelected = pageIds.every(id => selectedIds.has(id));
    if (allSelected) {
        pageIds.forEach(id => selectedIds.delete(id));
    } else {
        pageIds.forEach(id => selectedIds.add(id));
    }
    updateSelectionUI();
    renderTable();
}

function getCurrentPageIds() {
    const start = (currentPage - 1) * PAGE_SIZE;
    return filteredProds.slice(start, start + PAGE_SIZE).map(p => String(p.id));
}

function clearSelection() {
    selectedIds.clear();
    updateSelectionUI();
    renderTable();
}

function updateSelectionUI() {
    const count = selectedIds.size;
    const countEl = document.getElementById('selected-count');
    const bulkBar = document.getElementById('bulk-bar');
    const bulkInfo = document.getElementById('bulk-info');
    const checkAll = document.getElementById('check-all');

    countEl.textContent = `${count} dipilih`;
    countEl.style.display = count > 0 ? 'inline-flex' : 'none';

    if (count > 0) {
        bulkBar.classList.add('show');
        bulkInfo.textContent = `${count} produk dipilih`;
    } else {
        bulkBar.classList.remove('show');
    }

    // Update check-all state
    const pageIds = getCurrentPageIds();
    const allSelected = pageIds.length > 0 && pageIds.every(id => selectedIds.has(id));
    checkAll.classList.toggle('checked', allSelected);
}

async function bulkSetStatus(newStatus) {
    if (selectedIds.size === 0) return;
    const ids = [...selectedIds];
    const label = newStatus === 'tampil' ? 'ditampilkan' : 'disembunyikan';

    showToast(`Menyimpan ${ids.length} produk...`, 'info');
    ids.forEach(id => savingIds.add(id));
    renderTable();

    let successCount = 0;
    let failCount = 0;

    // Process in parallel (max 5 at a time)
    const BATCH = 5;
    for (let i = 0; i < ids.length; i += BATCH) {
        const batch = ids.slice(i, i + BATCH);
        await Promise.all(batch.map(async id => {
            try {
                await GASActions.update('products', String(id), { status: newStatus });
                const prod = allProducts.find(p => String(p.id) === String(id));
                if (prod) prod.status = newStatus;
                successCount++;
            } catch (e) {
                failCount++;
            } finally {
                savingIds.delete(id);
            }
        }));
        renderTable(); // update progress
    }

    updateStats();
    clearSelection();

    if (failCount === 0) {
        showToast(`${successCount} produk berhasil ${label}`, 'success');
    } else {
        showToast(`${successCount} berhasil, ${failCount} gagal`, failCount > 0 ? 'error' : 'success');
    }
}

/* ═══════════════════════════════════════════════
   STATS & CATEGORY FILTER
═══════════════════════════════════════════════ */
function updateStats() {
    const total  = allProducts.length;
    const on     = allProducts.filter(p => p.status !== 'sembunyikan').length;
    const off    = allProducts.filter(p => p.status === 'sembunyikan').length;
    const empty  = allProducts.filter(p => parseInt(p.stok || 0) === 0).length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-on').textContent    = on;
    document.getElementById('stat-off').textContent   = off;
    document.getElementById('stat-empty').textContent = empty;
}

function populateCategoryFilter() {
    const cats = [...new Set(allProducts.map(p => p.kategori).filter(Boolean))].sort();
    const sel  = document.getElementById('filter-category');
    sel.innerHTML = '<option value="all">Semua Kategori</option>' +
        cats.map(c => `<option value="${escHtml(c)}">${escHtml(c)}</option>`).join('');
}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
function showToast(msg, type = 'success') {
    const container = document.getElementById('toast-container');
    const icons = {
        success: '✓',
        error: '✕',
        info: 'ℹ'
    };
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<span>${icons[type] || '•'}</span> ${msg}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
}

/* ═══════════════════════════════════════════════
   UTILS
═══════════════════════════════════════════════ */
function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init
if (sessionStorage.getItem(BROSUR_PIN_KEY) === '1') {
    loadProducts();
}
</script>

</html>
